<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(14, 165, 233, 0.4); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen selection:bg-brand-500/30">
    <!-- Navigation -->
    <nav class="border-b border-slate-800/80 glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-brand-500/30">P</div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">PruneDash</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="active-wm-container" class="hidden md:flex items-center space-x-2 bg-brand-500/10 px-3 py-1.5 rounded-xl border border-brand-500/20">
                        <span class="text-[10px] font-bold text-brand-400 uppercase tracking-tighter">WM:</span>
                        <span id="active-wm" class="text-xs font-bold text-slate-300 tracking-tight">detecting...</span>
                    </div>
                    <div id="health-badge" hx-get="/api/health" hx-trigger="load, every 30s" class="flex items-center space-x-2">
                        <span class="h-2 w-2 rounded-full bg-slate-600 animate-pulse"></span>
                        <span class="text-xs font-medium text-slate-500 uppercase tracking-widest leading-none">System Online</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Hero Action -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800/40 rounded-3xl p-8 border border-slate-700/50 glass relative overflow-hidden group">
                    <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-brand-500/10 blur-3xl rounded-full group-hover:bg-brand-500/20 transition-all duration-700"></div>
                    
                    <h1 class="text-4xl font-black mb-2 tracking-tight">System Audit</h1>
                    <p class="text-slate-400 text-lg mb-8 max-w-lg">Identify unnecessary bloat and reclaim your storage with surgical precision.</p>
                    
                    <div class="flex flex-wrap gap-4 items-center">
                        <button hx-post="/api/scan" 
                                hx-target="#scan-results" 
                                hx-indicator="#loading-spinner"
                                class="group/btn relative inline-flex items-center justify-center bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-xl shadow-brand-500/25 active:scale-[0.98] overflow-hidden">
                            <span class="relative z-10 flex items-center space-x-2">
                                <span>Scan System</span>
                                <svg id="loading-spinner" class="htmx-indicator animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                            </span>
                        </button>
                        <button class="bg-slate-700/50 hover:bg-slate-700 text-slate-300 font-semibold py-4 px-8 rounded-2xl transition-all border border-slate-600/50">
                            Dry Run Settings
                        </button>
                    </div>

                    <div id="scan-results" class="mt-8 space-y-4">
                        <!-- Results will be injected here via HTMX -->
                    </div>
                </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-slate-800/30 p-8 rounded-3xl border border-slate-700/50 hover:border-brand-500/30 transition-colors group">
                            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-[0.2em] mb-4 group-hover:text-brand-400 transition-colors">Prunable Storage</h3>
                            <div class="flex items-baseline space-x-2">
                                <span id="total-reclaimable" class="text-4xl font-black tabular-nums">--</span>
                            </div>
                        </div>
                        <div class="bg-slate-800/30 p-8 rounded-3xl border border-slate-700/50 hover:border-brand-500/30 transition-colors group text-center md:text-left">
                            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-[0.2em] mb-4 group-hover:text-brand-400 transition-colors">Protected Assets</h3>
                            <div class="flex items-center justify-center md:justify-start space-x-3">
            </div>

         <!-- Main Content (Audit Results) - Full Width -->
        <div class="max-w-4xl mx-auto space-y-6">
            <!-- Summary Stats -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-slate-800/40 backdrop-blur-md rounded-3xl p-6 border border-white/5 shadow-2xl relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-brand-500/10 rounded-full blur-3xl group-hover:bg-brand-500/20 transition-all duration-700"></div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Reclaimable</p>
                    <div class="flex items-baseline space-x-2">
                        <span id="total-reclaimable" class="text-4xl font-black text-white tracking-tighter">--</span>
                    </div>
                </div>
                
                <div class="bg-slate-800/40 backdrop-blur-md rounded-3xl p-6 border border-white/5 shadow-2xl relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl group-hover:bg-blue-500/20 transition-all duration-700"></div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Protected Assets</p>
                    <div class="flex items-baseline space-x-2">
                        <span id="protected-assets-count" class="text-4xl font-black text-white tracking-tighter">--</span>
                        <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Locked</span>
                    </div>
                </div>
            </div>

            <!-- Detailed Results Container -->
            <div id="prune-results-container" class="min-h-[400px]">
                <div id="results-skeleton" class="flex flex-col items-center justify-center h-64 border-2 border-dashed border-white/5 rounded-3xl">
                    <div class="animate-bounce mb-4 text-4xl">🔍</div>
                    <p class="text-slate-500 font-medium italic">Initiate a scan to audit your system bloat...</p>
                </div>
            </div>

            <div id="prune-status"></div>
        </div>
     </div>
    </main>
	<script>
		function formatBytes(bytes) {
			if (bytes === 0) return '0 B';
			const k = 1024;
			const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
			const i = Math.floor(Math.log(bytes) / Math.log(k));
			return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
		}

		function updateTotals() {
			let total = 0;
			const categories = {};
			
			// Global selection
			document.querySelectorAll('input[name="assets"]:checked').forEach(cb => {
				const size = parseInt(cb.getAttribute('data-size') || 0);
				total += size;
				
				const cat = cb.getAttribute('data-category');
				if (cat) {
					categories[cat] = (categories[cat] || 0) + size;
				}
			});

			// Update Global Displays
			const totalStr = formatBytes(total);
			const totalElements = ['#current-selection-size', '#total-reclaimable'];
			totalElements.forEach(selector => {
				const el = document.querySelector(selector);
				if (el) el.innerText = totalStr;
			});

			// Update Category Displays
			document.querySelectorAll('.category-total').forEach(el => {
				const cat = el.getAttribute('data-category');
				el.innerText = formatBytes(categories[cat] || 0);
			});

			// Update Button State
			const btn = document.querySelector('#prune-form button[type="submit"]');
			if (btn) {
				btn.disabled = (total === 0);
			}
		}

		// Listen for changes on the form
		document.addEventListener('change', (e) => {
			if (e.target.name === 'assets') {
				updateTotals();
			}
		});

		// Also handle HTMX swaps - re-init totals after scan results load
		document.addEventListener('htmx:afterSwap', (e) => {
			if (e.detail.target.id === 'results-skeleton' || e.detail.target.id === 'prune-results-container') {
				updateTotals();
			}
		});
	</script>
</body>
</html>
