services:
  prunedash:
    build:
      context: ./backend
      dockerfile: Dockerfile
    privileged: true
    pid: host
    ports:
      - "3333:3333"
    volumes:
      - /var/cache/pacman/pkg:/host/var/cache/pacman/pkg:rw
      - /var/log/journal:/host/var/log/journal:rw
      - /home/nui/.cache:/host/home/nui/.cache:rw
    environment:
      - NODE_ENV=development
    restart: always
